name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, redis, pcntl, bcmath
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Set environment variables
        run: |
          echo "DB_HOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "DB_DATABASE=testing" >> "$GITHUB_ENV"
          echo "DB_USERNAME=sail" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=password" >> "$GITHUB_ENV"
          echo "REDIS_HOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "QUEUE_CONNECTION=redis" >> "$GITHUB_ENV"

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 60); do
            if php -r 'new PDO("mysql:host=127.0.0.1;port=3306;dbname=testing", "sail", "password");'; then
              echo "MySQL is up"
              exit 0
            fi
            echo "Waiting for MySQL (${i}/60)..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  code-quality:
    name: code-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
